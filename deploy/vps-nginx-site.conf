# /etc/nginx/sites-available/dx-rpg
# À activer : sudo ln -s /etc/nginx/sites-available/dx-rpg /etc/nginx/sites-enabled/dx-rpg
# Puis : sudo nginx -t && sudo systemctl reload nginx
#
# Prérequis : Let's Encrypt avec certbot
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d votre-domaine.com

server {
    listen 80;
    server_name votre-domaine.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name votre-domaine.com;

    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Main dx-rpg app (Docker expose port 8080 sur l'hôte)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support (Dioxus LiveView / Axum)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Évite le timeout sur les connexions WebSocket longues
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# SQLite web UI — PAS exposé via nginx public.
# Accès recommandé via SSH tunnel uniquement :
#   ssh -L 8082:localhost:8082 user@votre-serveur
# Ensuite ouvrir http://localhost:8082 en local.
# S'assurer que le port 8082 est bloqué dans le firewall VPS (ufw deny 8082).
