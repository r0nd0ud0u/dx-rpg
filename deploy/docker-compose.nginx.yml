name: dx-rpg

services:
  dx-rpg:
    image: ghcr.io/r0nd0ud0u/dx-rpg:latest
    restart: unless-stopped
    # Pas de ports exposés directement — nginx fait office de reverse proxy
    expose:
      - "8080"
    environment:
      PORT: "8080"
      IP: "0.0.0.0"
      DATABASE_URL: "sqlite:///data/db.sqlite"
      # LOG_LEVEL: "debug"
    env_file:
      - path: .env
        required: false
    volumes:
      - db_data:/data
      - saved_data:/usr/local/app/saved_data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' 2>/dev/null && [ $(stat -c%s //data/db.sqlite 2>/dev/null || echo 0) -gt 4096 ]"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Lightweight SQLite web UI — accessible via nginx sous /db/
  sqlite-web:
    image: coleifer/sqlite-web:latest
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      SQLITE_DATABASE: /data/db.sqlite
    command: ["sqlite_web", "-H", "0.0.0.0", "-p", "5000", "-x", "/data/db.sqlite"]
    volumes:
      - db_data:/data
    depends_on:
      dx-rpg:
        condition: service_healthy

  # nginx reverse proxy — expose le port 80 vers l'hôte
  # Proxifie dx-rpg (/) et sqlite-web (/db/)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dx-rpg:
        condition: service_healthy
      sqlite-web:
        condition: service_started

volumes:
  db_data:
  saved_data:
